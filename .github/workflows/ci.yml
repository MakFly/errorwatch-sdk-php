name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Library runtime supports php ^8.1, but the dev/test toolchain
        # (orchestra/testbench, phpunit 11, doctrine/dbal ^4.4) requires 8.2+,
        # so the test matrix starts at 8.2. Real consumers (Laravel 12) are 8.2+.
        php: ['8.2', '8.3', '8.4']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, curl, json
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --no-check-publish --no-check-lock

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ matrix.php }}-

      # Resolve dependencies fresh per PHP version (the matrix tests the supported
      # range ^8.1; --no-scripts skips the Symfony bundle installer meant for hosts).
      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress --no-scripts

      - name: Run test suite
        run: vendor/bin/phpunit
